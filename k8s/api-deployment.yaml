apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ns-microservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: sunandgmohan/api-gateway
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ns-microservice
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30007
