apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ns-microservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: sunandgmohan/user-service
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ns-microservice
spec:
  selector:
    app: user-service
  ports:
    - port: 3000
      targetPort: 3000
      


